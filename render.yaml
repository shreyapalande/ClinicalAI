services:
  - type: web
    name: clinai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: clinai-db
          property: connectionString

databases:
  - name: clinai-db
    plan: free
